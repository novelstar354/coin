<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>スターコインレート</title>
<link rel="icon" href="https://img.pikbest.com/wp/202408/premium-quality-guarantee-label-with-star-icon-on-3d-gold-coins-illustrated_9748493.jpg!bw800" sizes="16×16" type="image/png" />  
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
  --bg:#0b1020;
  --card:#121a2b;
  --line:#24304a;
  --text:#f8fafc;
  --sub:#94a3b8;
  --green:#22c55e;
  --red:#ef4444;
  --blue:#38bdf8;
  --gold:#facc15;
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  min-height:100vh;
  padding:20px;
  background:
    radial-gradient(circle at top,#172554 0%,#0b1020 60%);
  color:var(--text);
  font-family:
    -apple-system,
    BlinkMacSystemFont,
    "Segoe UI",
    sans-serif;
    user-select: none;
  -webkit-user-select: none;
}

.container{
  max-width:1150px;
  margin:auto;
}

.title{
  display:flex;
  align-items:center;
  gap:16px;
  margin-bottom:24px;
}

.coin{
  width:74px;
  height:74px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:36px;
  font-weight:900;
  background:
    radial-gradient(circle at 30% 30%,#fff7b2 0%,#facc15 40%,#eab308 100%);
  color:#78350f;
  box-shadow:0 0 35px rgba(250,204,21,.5);
}

h1{
  margin:0;
  font-size:38px;
}

.sub{
  color:var(--sub);
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:18px;
  margin-bottom:18px;
}

.card{
  background:rgba(18,26,43,.95);
  border:1px solid var(--line);
  border-radius:24px;
  padding:22px;
  box-shadow:0 12px 30px rgba(0,0,0,.35);
}

.label{
  color:var(--sub);
  font-size:14px;
  margin-bottom:10px;
}

.value{
  font-size:34px;
  font-weight:900;
}

.rate{
  color:var(--gold);
  text-shadow:0 0 15px rgba(250,204,21,.35);
}

.cash{
  color:var(--green);
}

.profit.plus{
  color:var(--green);
}

.profit.minus{
  color:var(--red);
}

.trade-grid{
  display:grid;
  gap:16px;
  margin-top:12px;
}

.trade-row{
  display:flex;
  flex-wrap:wrap;
  gap:12px;
}

button{
  flex:1;
  min-width:170px;
  border:none;
  border-radius:16px;
  padding:15px;
  color:white;
  font-size:16px;
  font-weight:700;
  cursor:pointer;
  transition:.18s;
}

button:hover{
  transform:translateY(-2px);
}

.buy{
  background:linear-gradient(135deg,#22c55e,#16a34a);
}

.sell{
  background:linear-gradient(135deg,#ef4444,#dc2626);
}

input{
  width:100%;
  padding:14px;
  border:none;
  outline:none;
  border-radius:14px;
  background:#1e293b;
  color:white;
  font-size:16px;
}

.small{
  font-size:13px;
  color:var(--sub);
}

.chart-wrap{
  margin-top:18px;
  background:rgba(18,26,43,.95);
  border:1px solid var(--line);
  border-radius:24px;
  padding:18px;
}

canvas{
  width:100% !important;
  height:420px !important;
}

.log{
  margin-top:18px;
  background:rgba(18,26,43,.95);
  border:1px solid var(--line);
  border-radius:24px;
  padding:18px;
  max-height:260px;
  overflow:auto;
}

.log-item{
  padding:10px 0;
  border-bottom:1px solid rgba(255,255,255,.07);
  color:#dbeafe;
}

.flash{
  animation:flash .3s;
}

@keyframes flash{
  0%{
    transform:scale(1);
  }
  50%{
    transform:scale(1.03);
  }
  100%{
    transform:scale(1);
  }
}

@media (max-width:700px){

  h1{
    font-size:28px;
  }

  .value{
    font-size:28px;
  }

}
/* =========================
   管理者パネル
========================= */

#adminOverlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.7);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999;
  backdrop-filter:blur(6px);
}

#adminPanel{
  width:95%;
  max-width:520px;
  background:#050816;
  border:1px solid #1e293b;
  border-radius:24px;
  padding:24px;
  box-shadow:
    0 0 50px rgba(56,189,248,.2);
  font-family:monospace;
}

.admin-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.admin-title{
  font-size:24px;
  font-weight:900;
  color:#38bdf8;
  letter-spacing:2px;
}

#closeAdmin{
  width:42px;
  height:42px;
  border:none;
  border-radius:12px;
  background:#ef4444;
  color:white;
  font-size:20px;
  cursor:pointer;
}

.admin-label{
  color:#94a3b8;
  margin-bottom:8px;
  font-size:13px;
}

.admin-section{
  margin-top:18px;
}

.adminBtn{
  width:100%;
  margin-top:10px;
  border:none;
  border-radius:14px;
  padding:14px;
  font-weight:800;
  color:white;
  cursor:pointer;
}

.adminBtn.green{
  background:linear-gradient(135deg,#22c55e,#16a34a);
}

.adminBtn.red{
  background:linear-gradient(135deg,#ef4444,#dc2626);
}

.adminBtn.blue{
  background:linear-gradient(135deg,#3b82f6,#2563eb);
}

.adminBtn.yellow{
  background:linear-gradient(135deg,#facc15,#eab308);
  color:#111827;
}
</style>
</head>

<script>
/* =========================
   基本データ
========================= */

let rate = 50;

let cash = 10000;

let starCoins =
  Number(
    localStorage.getItem("starCoins")
  ) || 0;

const START_CASH = 10000;

/* =========================
   要素
========================= */

const rateText =
  document.getElementById("rateText");

const cashText =
  document.getElementById("cashText");

const coinText =
  document.getElementById("coinText");

const profitText =
  document.getElementById("profitText");

const log =
  document.getElementById("log");

const rateCard =
  document.getElementById("rateCard");

/* =========================
   グラフ
========================= */

const ctx =
  document.getElementById("chart");

const labels = [];

const graphData = [];

const chart = new Chart(ctx,{
  type:"line",

  data:{
    labels,

   /* datasets:[{
      label:"スターコインレート",
      data:graphData,
      tension:0.25,
      borderWidth:3,
      pointRadius:0
    }]
  },*/
    datasets:[{
  label:"スターコインレート",
  data:graphData,
  tension:0.25,
  borderWidth:3,
  pointRadius:0,
  borderColor:"#facc15",
  backgroundColor:"rgba(250,204,21,.12)",
  fill:true
}]
},

  options:{
    responsive:true,

    maintainAspectRatio:false,

    plugins:{
      legend:{
        labels:{
          color:"white"
        }
      }
    },

    scales:{
      x:{
        ticks:{
          color:"#94a3b8"
        },

        grid:{
          color:"rgba(255,255,255,.06)"
        }
      },

      y:{
        ticks:{
          color:"#94a3b8"
        },

        grid:{
          color:"rgba(255,255,255,.06)"
        }
      }
    }
  }
});
window.addEventListener("storage",()=>{

  starCoins =
    Number(
      localStorage.getItem("starCoins")
    ) || 0;

  updateUI();

});
/* =========================
   ログ
========================= */

function addLog(text){

  const div =
    document.createElement("div");

  div.className = "log-item";

  div.textContent =
    "[" +
    new Date().toLocaleTimeString() +
    "] " +
    text;

  log.prepend(div);

}

/* =========================
   UI更新
========================= */

function updateUI(){

  rateText.textContent =
    rate.toFixed(2) +
    " STAR / ¥1";

  cashText.textContent =
    "¥" +
    Math.floor(cash);

  coinText.textContent =
    Math.floor(starCoins) +
    " STAR";

  const asset =
    cash +
    (starCoins / rate);

  const profit =
    asset - START_CASH;

  profitText.textContent =
    (profit >= 0 ? "+" : "") +
    "¥" +
    Math.floor(profit);

  profitText.className =
    "value profit " +
    (profit >= 0 ? "plus" : "minus");

}

/* =========================
   レート変動
========================= */

/*function updateRate(){

  const move =
    (Math.random() - 0.5) * 8;

  rate += move;

  if(rate < 5){
    rate = 5;
  }

  labels.push("");

  graphData.push(
    Number(rate.toFixed(2))
  );

  if(labels.length > 50){

    labels.shift();

    graphData.shift();

  }

  chart.update();

  updateUI();

  rateCard.classList.remove("flash");

  void rateCard.offsetWidth;

  rateCard.classList.add("flash");
saveData();
}*/


/* =========================
   カスタム量
========================= */

function getCustomAmount(){

  const value =
    Number(
      document.getElementById("customAmount").value
    );

  if(
    isNaN(value) ||
    value <= 0
  ){
    return 10;
  }

  return Math.floor(value);

}

/* =========================
   購入
========================= */

function buyStar(amount){

  const cost =
    amount / rate;

  if(cash < cost){

    addLog(
      "現金不足で購入失敗"
    );

    return;
  }

  starCoins += amount;

  cash -= cost;

  addLog(
    amount +
    " STAR 購入（¥" +
    Math.floor(cost) +
    "）"
  );
saveData();
  updateUI();

}

/* =========================
   売却
========================= */

function sellStar(amount){

  if(starCoins < amount){

    addLog(
      "STAR不足で売却失敗"
    );

    return;
  }

  const yen =
    amount / rate;

  starCoins -= amount;

  cash += yen;

  addLog(
    amount +
    " STAR 売却（¥" +
    Math.floor(yen) +
    "）"
  );
saveData();
  updateUI();

}

/* =========================
   ボタン
========================= */

document
.getElementById("buy1Btn")
.addEventListener("click",()=>{

  buyStar(1);

});

document
.getElementById("buyCustomBtn")
.addEventListener("click",()=>{

  buyStar(
    getCustomAmount()
  );

});

document
.getElementById("sell1Btn")
.addEventListener("click",()=>{

  sellStar(1);

});

document
.getElementById("sellCustomBtn")
.addEventListener("click",()=>{

  sellStar(
    getCustomAmount()
  );

});

/* =========================
   初期グラフ
========================= */

for(let i=0;i<25;i++){

  labels.push("");

  graphData.push(rate);

}


/* =========================
   セーブ
========================= */

function saveData(){

  const save = {

    rate,
    cash,
    starCoins,
    labels,
    graphData

  };

  localStorage.setItem(
    "starCoinSave",
    JSON.stringify(save)
  );
localStorage.setItem(
  "starCoins",
  Math.floor(starCoins)
);
}

/* =========================
   ロード
========================= */

function loadData(){

  const raw =
    localStorage.getItem("starCoinSave");

  if(!raw){
    return;
  }

  try{

    const save =
      JSON.parse(raw);

    if(save.rate !== undefined)
      rate = save.rate;

    if(save.cash !== undefined)
      cash = save.cash;

    if(save.starCoins !== undefined)
      starCoins = save.starCoins;

    if(Array.isArray(save.labels)){

      labels.length = 0;

      save.labels.forEach(v=>{
        labels.push(v);
      });

    }

    if(Array.isArray(save.graphData)){

      graphData.length = 0;

      save.graphData.forEach(v=>{
        graphData.push(v);
      });

    }

    chart.update();

    updateUI();
localStorage.setItem(
  "starCoins",
  Math.floor(starCoins)
);
    addLog("保存データを読み込みました");

  }catch(e){

    console.error(e);

  }

}
/* =========================
   銀行サイト同期
========================= */

function syncStarCoins(){

  const saved =
    Number(
      localStorage.getItem("starCoins")
    ) || 0;

  if(saved !== starCoins){

    starCoins = saved;

    updateUI();

    addLog(
      "銀行データと同期しました"
    );

  }

}

/* 1秒ごと同期 */

setInterval(syncStarCoins,1000);
/* =========================
   リセット
========================= */
/* =========================
   初期グラフ
========================= */

function createDefaultGraph(){

  labels.length = 0;
  graphData.length = 0;

  for(let i=0;i<25;i++){

    labels.push("");
    graphData.push(rate);

  }

}
/* =========================
   管理者モード
========================= */

let adminLoggedIn = false;


const adminOverlay =
  document.getElementById("adminOverlay");

const loginArea =
  document.getElementById("loginArea");

const adminArea =
  document.getElementById("adminArea");

/* =========================
   起動
========================= */

document.addEventListener("keydown",(e)=>{

  if(
    e.ctrlKey &&
    e.altKey &&
    e.key.toLowerCase() === "l"
  ){

    adminOverlay.style.display = "flex";

  }

});

/* =========================
   閉じる
========================= */

document
.getElementById("closeAdmin")
.addEventListener("click",()=>{

  adminOverlay.style.display = "none";

  // ログアウト処理
  adminLoggedIn = false;

  loginArea.style.display = "block";
  adminArea.style.display = "none";

  document.getElementById("adminPassword").value = "";

  addLog("管理者モードログアウト");

});

document.addEventListener("keydown",(e)=>{

  if(e.key === "Escape"){

    adminOverlay.style.display = "none";

    adminLoggedIn = false;

    loginArea.style.display = "block";
    adminArea.style.display = "none";

    document.getElementById("adminPassword").value = "";

    addLog("管理者モードログアウト（ESC）");

  }

});

/* =========================
   ログイン
========================= */

document
.getElementById("loginBtn")
.addEventListener("click",()=>{

  const pass =
    document.getElementById("adminPassword").value;

  if(pass !== "appleQer!"){

    alert("ACCESS DENIED");

    return;

  }

  adminLoggedIn = true;

  loginArea.style.display = "none";

  adminArea.style.display = "block";

  addLog("管理者モードログイン");

});

/* =========================
   STAR追加
========================= */

/* =========================
   STAR増減
========================= */

document
.getElementById("giveStarBtn")
.addEventListener("click",()=>{

  const amount = Number(
    document.getElementById("giveStarInput").value
  );

  if(isNaN(amount)){
    return;
  }

  starCoins += Math.floor(amount);

  if(starCoins < 0){
    starCoins = 0;
  }

  saveData();

  updateUI();

  addLog(
    "管理者: " +
    (amount >= 0 ? "+" : "") +
    Math.floor(amount) +
    " STAR"
  );

});

/* =========================
   レート変更
========================= */

document
.getElementById("setRateBtn")
.addEventListener("click",()=>{

  const value =
    Number(
      document.getElementById("setRateInput").value
    );

  if(
    isNaN(value) ||
    value <= 0
  ){
    return;
  }

  rate = value;

  chart.update();

  updateUI();

  saveData();

  addLog(
    "管理者: レート変更 → " +
    value
  );

});

/* =========================
   現金追加
========================= */

/* =========================
   現金増減
========================= */

document
.getElementById("giveCashBtn")
.addEventListener("click",()=>{

  const amount = Number(
    document.getElementById("giveCashInput").value
  );

  if(isNaN(amount)){
    return;
  }

  cash += amount;

  if(cash < 0){
    cash = 0;
  }

  saveData();

  updateUI();

  addLog(
    "管理者: " +
    (amount >= 0 ? "+" : "") +
    "¥" +
    Math.floor(amount)
  );

});

/* =========================
   凍結モード
========================= */

document
.getElementById("freezeBtn")
.addEventListener("click",()=>{

  freezeMode = !freezeMode;

  document.getElementById("freezeBtn")
  .textContent =
    freezeMode
    ? "凍結ON"
    : "凍結OFF";

  addLog(
    "管理者: 凍結モード " +
    (freezeMode ? "ON" : "OFF")
  );

});

/* =========================
   レート変動修正
========================= */
let freezeMode = false;



/* =========================
   レート変動修正
========================= */


function updateRate(){

  if(freezeMode){
    return;
  }

  const move =
    (Math.random() - 0.5) * 8;

  rate += move;

  if(rate < 5){
    rate = 5;
  }

  labels.push("");

  graphData.push(
    Number(rate.toFixed(2))
  );

  if(labels.length > 50){
    labels.shift();
    graphData.shift();
  }

  chart.update();

  updateUI();

  rateCard.classList.remove("flash");
  void rateCard.offsetWidth;
  rateCard.classList.add("flash");

  saveData();
}

let tapCount = 0;
let firstTapTime = 0;

function secretAdminOpen(){

  const now = Date.now();

  if(now - firstTapTime > 1000){
    tapCount = 0;
    firstTapTime = now;
  }

  tapCount++;

  if(tapCount >= 3){

    tapCount = 0;

    document.getElementById("adminOverlay").style.display = "flex";

  }

}

rateCard.addEventListener("click", secretAdminOpen);
rateCard.addEventListener("touchstart", secretAdminOpen);
/* =========================
   リセット
========================= */

function resetData(){

  if(!confirm("データをリセットしますか？")){
    return;
  }

  rate = 50;
  cash = 10000;
  starCoins = 0;

  createDefaultGraph();

  chart.update();

  updateUI();

  localStorage.removeItem("starCoinSave");
localStorage.setItem(
  "starCoins",
  0
);
  addLog("データをリセットしました");

}
